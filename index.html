    :root {
      --cyan:   #00D9FF;
      --orange: #FF8C00;
      --pink:   #FF4D6D;
      --bg:     #0A0A0F;
      --card:   #12121A;
      --border: #1E1E2E;
      --text:   #E0E0F0;
      --muted:  #7A7A9A;
    }

    body.light {
      --cyan:   #0099BB;
      --orange: #C96A00;
      --pink:   #C0294A;
      --bg:     #EEF1F8;
      --card:   #FFFFFF;
      --border: #D0D5E8;
      --text:   #1A1A2E;
      --muted:  #6B7280;
    }

    body.light {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,153,187,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(192,41,74,0.05) 0%, transparent 60%);
    }

    body.light .card::after {
      background-image:
        linear-gradient(rgba(0,153,187,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,153,187,0.04) 1px, transparent 1px);
    }

    body.light .lang-btn {
      background: #E2E7F4;
      border-color: #C4CBE0;
    }

    body.light .dev-bio {
      background: rgba(201,106,0,0.06);
    }

    body.light .feature-tag {
      background: rgba(0,153,187,0.08);
    }

    body.light .play-btn {
      background: rgba(0,153,187,0.09);
      border-color: rgba(0,153,187,0.35);
    }

    body.light .play-btn:hover {
      background: rgba(0,153,187,0.17);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,217,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,77,109,0.06) 0%, transparent 60%);
    }

    /* ── Language Switcher ── */
    .lang-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lang-btn {
      background: var(--border);
      color: var(--muted);
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .lang-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .lang-btn.active {
      background: rgba(0,217,255,0.12);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px 30px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,217,255,0.04),
        0 8px 40px rgba(0,0,0,0.6),
        0 0 80px rgba(0,217,255,0.04);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--orange));
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,217,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* ── Developer header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: rgba(0,217,255,0.08);
      border: 1px solid rgba(0,217,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0,217,255,0.6);
    }

    .title-block { flex: 1; }

    .dev-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.75rem;
      color: var(--cyan);
      letter-spacing: 0.04em;
      text-shadow: 0 0 16px rgba(0,217,255,0.4);
      line-height: 1.15;
    }

    .dev-sub {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 6px;
      line-height: 1.3;
    }

    /* ── Developer bio ── */
    .dev-bio {
      position: relative;
      z-index: 1;
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 22px;
      padding: 14px 16px;
      background: rgba(255,140,0,0.05);
      border-left: 3px solid var(--orange);
      border-radius: 0 8px 8px 0;
    }

    /* ── Divider ── */
    .divider {
      position: relative;
      z-index: 1;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    /* ── App section ── */
    .app-section {
      position: relative;
      z-index: 1;
    }

    .app-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }

    .app-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .app-name span { color: var(--cyan); }

    .app-badge {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--orange);
      border: 1px solid rgba(255,140,0,0.35);
      border-radius: 4px;
      padding: 2px 7px;
      text-transform: uppercase;
    }

    .app-tagline {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 14px;
      font-style: italic;
    }

    .app-desc {
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    /* ── Feature tags ── */
    .features-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }

    .feature-tag {
      font-size: 0.65rem;
      color: var(--cyan);
      background: rgba(0,217,255,0.07);
      border: 1px solid rgba(0,217,255,0.2);
      border-radius: 5px;
      padding: 3px 9px;
    }

    /* ── Play Store button ── */
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,217,255,0.1);
      border: 1px solid rgba(0,217,255,0.35);
      border-radius: 8px;
      padding: 9px 16px;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .play-btn:hover {
      background: rgba(0,217,255,0.18);
      border-color: var(--cyan);
    }

    .play-btn-icon { font-size: 1rem; }

    /* ── Contact ── */
    .contact {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
    }

    .contact-icon { width: 20px; text-align: center; font-size: 0.9rem; flex-shrink: 0; }
    .contact-label { color: var(--muted); width: 52px; flex-shrink: 0; }
    .contact-value { color: var(--text); }
    .contact-value a { color: var(--cyan); text-decoration: none; }
    .contact-value a:hover { text-decoration: underline; }

    /* ── Footer ── */
    .card-footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .footer-tagline {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-style: italic;
    }

    .footer-copy {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .dots { display: flex; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Theme toggle ── */
    .theme-btn {
      background: var(--border);
      color: var(--muted);
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }

    .theme-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    body.light .theme-btn { border-color: #C4CBE0; }
  </style>
</head>

    featuresEl.innerHTML = '';
    d.features.forEach(f => {
      const tag = document.createElement('span');
      tag.className = 'feature-tag';
      tag.textContent = f;
      featuresEl.appendChild(tag);
    });

    const btn = document.getElementById('play-btn');
    btn.href = d.playHref;
    document.getElementById('play-btn-text').textContent = d.playText;

    document.getElementById('lbl-email').textContent  = d.lblEmail;
    document.getElementById('lbl-store').textContent  = d.lblStore;
    document.getElementById('footer-tagline').textContent = d.footer;

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === code);
    });
    document.documentElement.lang = code;
  }

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('theme-btn').textContent = isLight ? '☾' : '☀';
  }

  setLang('pl');
</script>
</body>
</html>
